<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Ma scène A-Frame</title>
    <!-- Importer la bibliothèque A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="/AR.js"></script>
  </head>
  <body style="margin : 0px; overflow: hidden;">
    <!--
     <a-scene> 
      <a-box position="2 2 -4" rotation="0 45 0" width="1.5" height="1.5" color="tomato"></a-box>
      <a-box position="0 2 -2.5" rotation="0 90 0" width="2" height="1.5" color="purple"></a-box>
      <a-box position="-2 2 -3" rotation="0 0 0" width="2" height="2" depth="2" color="green"></a-box>

      <a-plane position="0 -0.5 -4" rotation="-90 0 0" width="10" height="10" color="lightgrey"></a-plane>

      <a-light type="ambient" color="#888"></a-light>
      <a-light type="directional" position="2 4 -3" intensity="1"></a-light>

      <a-camera position="0 10 15"></a-camera>

      <a-sky color="#00FFFF"></a-sky>
     
    </a-scene>  
    -->

    <a-scene embedded arjs>
      
      <!-- Marqueur Hiro -->
      <a-marker preset="pattern-frame">
        <!-- Boîte semi-transparente qui tourne -->
        <a-box 
            id="myBox"
            position="0 0.5 0" 
            class="clickable"
            material="opacity: 0.6; color: #ffdab9;" 
            animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
            click-animate>
        </a-box>

      </a-marker>

      <a-entity camera>
        <a-cursor
        fuse="false"
          raycaster="objects: .clickable">
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
